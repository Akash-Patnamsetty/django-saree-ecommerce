<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnapika Stores | Shopping Bag</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --gold: #D4AF37;
        }
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
        }

        .brand-font {
            font-family: 'Cinzel', serif;
        }

        /* --- Updated Card Style based on Screenshot --- */
        .gnapika-card {
            background-color: #0c0c0c;
            border: 1px solid #1a1a1a;
            border-radius: 40px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .product-image-container {
            width: 100%;
            height: 220px;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* --- Toast Notification Styles --- */
        #toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            pointer-events: none;
        }

        .toast {
            min-width: 240px;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: slideDownFade 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        .toast-success {
            background: #22c55e;
            color: white;
        }

        .toast-error {
            background: #ef4444;
            color: white;
        }

        @keyframes slideDownFade {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast-fade-out {
            animation: slideUpFade 0.4s ease forwards !important;
        }

        @keyframes slideUpFade {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        /* --- Quantity Selector Style --- */
        .qty-box {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #1a1a1a;
            padding: 8px 12px;
            border-radius: 16px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #333;
            border-radius: 10px;
            transition: 0.2s;
        }

        .qty-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
    </style>
</head>

<body class="p-4 md:p-10">



   
    <nav id="navbar">
        {% include "base.html" %}
        {% block content %}
        {% endblock %}
    </nav>

    <div id="toast-container"></div>
    <main class="max-w-md mx-auto space-y-6">
        <h1 class="brand-font text-2xl tracking-[0.2em] mb-8 text-center uppercase">Bag (<span id="cart-count">1</span>)
        </h1>
        <!--entra caards-->
        <!-- {% for item in cart_items%} -->
        <div id="cart-items-container" class="space-y-6">
            {% for item in cart_items%}
            <div class="gnapika-card cart-item" data-price="{{ item.product.price }}"
                data-product-id="{{ item.product.pk }}">
                <div class="product-image-container">
                    <a href="/product/{{ item.product.pk }}/">
                        <img src="/media/{{ item.main_image.image_path }}" class="w-full h-full object-cover"> </a>
                </div>
                <div class="flex justify-between items-start mb-1">
                    <a href="/product/{{ item.product.pk }}/">
                        <h2 class="brand-font text-xl font-bold tracking-wide">{{ item.product.title }}</h2>
                    </a>
                    <button onclick="removeItem(this)" class="text-zinc-600 hover:text-red-500 transition"
                        data-product-id="{{ item.product.pk }}">
                        <i class="far fa-trash-alt text-lg"></i>
                    </button>
                </div>
                <p class="text-[10px] text-[#D4AF37] font-bold uppercase tracking-[0.2em] mb-8">Heritage Weave</p>

                <div class="flex justify-between items-center">
                    <div class="qty-box">
                        <button onclick="updateQty(this, -1)" class="qty-btn"><i
                                class="fas fa-minus text-[10px]"></i></button>
                        <span class="text-sm font-bold item-qty">{{ item.quantity }}</span>
                        <button onclick="updateQty(this, 1)" class="qty-btn"><i
                                class="fas fa-plus text-[10px]"></i></button>
                    </div>
                    <p class="text-2xl font-bold text-[#D4AF37]">₹<span
                            class="item-total-price">{{item.product.price|floatformat:0|add:"0" }}</span></p>
                </div>
            </div>
            {%endfor%}
        </div>

        <!-- {%endfor%} -->
        <!--entra-->
        <p id="empty-cart" class="text-center text-zinc-500 hidden">
            Your bag is empty
        </p>
        <div class="pt-10 space-y-4">
            <div class="flex justify-between items-center px-4">
                <span class="brand-font text-zinc-500 tracking-widest">Total</span>
                <span class="text-2xl font-bold text-[#D4AF37]">₹<span id="final-total">0</span></span>
            </div>

            <!-- <a href="/order/cart/"> <button
                    class="w-full bg-[#D4AF37] text-black font-black py-5 rounded-[2rem] uppercase text-[11px] tracking-[0.3em] shadow-xl shadow-yellow-900/10 active:scale-95 transition-all">
                    Proceed to Checkout
                </button> </a> -->

{% if cart_items %}
    <a href="/order/cart/">
        <button
            class="w-full bg-[#D4AF37] text-black font-black py-5 rounded-[2rem] uppercase text-[11px] tracking-[0.3em] shadow-xl shadow-yellow-900/10 active:scale-95 transition-all">
            Proceed to Checkout
        </button>
    </a>
{% else %}
    <a href="/">  <!-- redirect to products page -->
        <button
            class="w-full bg-gray-400 text-black font-black py-5 rounded-[2rem] uppercase text-[11px] tracking-[0.3em] shadow-xl shadow-gray-500/10 cursor-not-allowed">
            Cart is Empty - Browse Products
        </button>
    </a>
{% endif %}


        </div>
    </main>

    <script>

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'success' ? 'toast-success' : 'toast-error'}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-plus-circle' : 'fa-minus-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('toast-fade-out');
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }


        if (document.querySelectorAll('.cart-item').length === 0) {
            document.getElementById("empty-cart").classList.remove("hidden");
        }


        document.addEventListener("DOMContentLoaded", function () {
            initializeItemTotals();
            calculateTotal();
            updateCartCount();
        });


        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById('cart-count').innerText =
                document.querySelectorAll('.cart-item').length;
        });
        function initializeItemTotals() {
            document.querySelectorAll('.cart-item').forEach(item => {
                const qty = parseInt(item.querySelector('.item-qty').innerText);
                const basePrice = parseInt(item.dataset.price);
                const priceElement = item.querySelector('.item-total-price');

                priceElement.innerText = qty * basePrice;
            });
        }

        function updateQty(btn, change) {
            // btn.disabled = true;
            const itemCard = btn.closest('.cart-item');
            const productId = itemCard.dataset.productId;

            const qtyElement = itemCard.querySelector('.item-qty');
            const priceElement = itemCard.querySelector('.item-total-price');
            const basePrice = parseInt(itemCard.getAttribute('data-price'));

            let currentQty = parseInt(qtyElement.innerText);

            if (change > 0) {
                currentQty++;
                showToast("Product added to bag", "success");
            }
            else if (change < 0 && currentQty > 1) {
                currentQty--;
                showToast("Product removed from bag", "error");
            }
            else {
                return;
            }

            // update UI
            qtyElement.innerText = currentQty;
            priceElement.innerText = basePrice * currentQty;
            calculateTotal();

            // update backend
            fetch(`/update_cart_qty/${productId}/`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie("csrftoken")
                },
                body: JSON.stringify({
                    quantity: currentQty
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (!data.success) {
                        console.log("Failed to update quantity");
                    }
                })
                .catch(error => console.error("Error:", error));
        }

        function removeItem(btn) {

            const productId = btn.dataset.productId;
            const itemCard = btn.closest('.cart-item');
            fetch(`/remove_from_cart/${productId}/`, {
                method: "POST",
                headers: {
                    "X-CSRFToken": getCookie("csrftoken")
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {

                        // keep your animation exactly same
                        showToast("Item deleted from cart", "error");

                        itemCard.style.opacity = '0';
                        itemCard.style.transform = 'scale(0.9)';

                        setTimeout(() => {
                            itemCard.remove();
                            calculateTotal();
                            document.getElementById('cart-count').innerText =
                                document.querySelectorAll('.cart-item').length;
                        }, 400);

                    }
                })
                .catch(error => console.error("Error:", error));
        }

        function calculateTotal() {
            let total = 0;
            document.querySelectorAll('.item-total-price').forEach(priceSpan => {
                total += parseInt(priceSpan.innerText);
            });
            document.getElementById('final-total').innerText = total;
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>

</html>
