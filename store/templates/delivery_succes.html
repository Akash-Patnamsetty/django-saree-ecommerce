<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Gnapika Stores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        :root { --gold: #D4AF37; }
        
        /* Fixed body to allow scrolling if content is long on mobile */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: white; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .brand-font { font-family: 'Cinzel', serif; }

        /* Flower Petal Animation */
        .petal {
            position: fixed; top: -10%;
            background: linear-gradient(to bottom right, #ffb7b7, #e87e7e);
            border-radius: 150% 0 150% 0;
            opacity: 0.7; z-index: 1;
            animation: fall linear forwards;
            pointer-events: none;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Success Card Reveal */
        @keyframes reveal {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        .animate-success { animation: reveal 0.8s cubic-bezier(0.2, 1, 0.2, 1) forwards; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Floating Animation for Checkmark */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float-icon { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="p-6">

    <div id="petal-container" class="fixed inset-0 pointer-events-none z-0"></div>

    <main class="max-w-lg w-full glass-card rounded-[3rem] p-8 md:p-12 text-center animate-success relative z-10 my-10">
        
        <div class="w-20 h-20 bg-[#D4AF37]/10 rounded-full flex items-center justify-center mx-auto mb-6 float-icon border border-[#D4AF37]/30">
            <i class="fas fa-check text-3xl text-[#D4AF37]"></i>
        </div>

        <h1 class="brand-font text-2xl md:text-3xl font-bold text-[#D4AF37] tracking-widest mb-3">Order Confirmed</h1>
        <p class="text-zinc-400 text-sm leading-relaxed mb-8 px-2">
            Your piece of heritage is being prepared. <br>
            Confirmation sent to <span class="text-white font-semibold">akash@example.com</span>
        </p>

        <div class="bg-black/40 rounded-[2rem] p-5 mb-8 border border-white/5 text-left">
            <div class="flex justify-between items-center pb-3 border-b border-white/5 mb-4">
                <span class="text-[9px] text-zinc-500 uppercase font-black tracking-widest">Order ID</span>
                <span class="text-xs font-bold text-zinc-200">#GN-{{order.id}}</span>
            </div>

                {%for item in items%}
            <div class="flex gap-4 items-center">
                <div class="w-14 h-14 bg-zinc-800 rounded-xl overflow-hidden shrink-0 border border-white/10">
                    <img src="/media/{{ item.image }}" class="w-full h-full object-cover">
                </div>
                <div>
                    <h4 class="text-sm font-bold leading-tight">{{ item.title }}</h4>
                    <p class="text-[10px] text-[#D4AF37] font-bold mt-1 uppercase tracking-wider">Qty: {{ item.quantity }} | Price: ₹{{ item.price }} | Total: ₹{{ item.total }}</p>
                </div>
            </div>
            {%endfor%}        
        </div>

        <div class="flex flex-col gap-3">
            <a href="" class="w-full bg-[#D4AF37] text-black font-black py-4 rounded-2xl text-[10px] uppercase tracking-[0.25em] hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-yellow-900/20">
                Track Order Status
            </a>
            <a href="/" class="w-full border border-zinc-700 text-zinc-300 font-bold py-4 rounded-2xl text-[10px] uppercase tracking-[0.25em] hover:bg-white/5 active:scale-95 transition-all">
                Continue Shopping
            </a>
        </div>
        <div class="mt-10 flex justify-center gap-8 text-zinc-500">
            <a href="#" class="hover:text-[#D4AF37] transition-colors"><i class="fab fa-instagram text-lg"></i></a>
            <a href="#" class="hover:text-[#D4AF37] transition-colors"><i class="fab fa-facebook-f text-lg"></i></a>
            <a href="#" class="hover:text-[#D4AF37] transition-colors"><i class="fab fa-whatsapp text-lg"></i></a>
        </div>
    </main>

    <script>
        // --- Petal Animation Logic ---
        function createPetal() {
            const container = document.getElementById('petal-container');
            if (!container) return;
            
            const petal = document.createElement('div');
            petal.className = 'petal';
            
            const size = Math.random() * 15 + 10 + 'px';
            petal.style.width = size;
            petal.style.height = size;
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = Math.random() * 2 + 3 + 's'; // Slightly faster fall
            
            container.appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, 5000);
        }

        // Spawn petals every 400ms for a more elegant look
        const petalInterval = setInterval(createPetal, 400);
        
        // Stop spawning after 6 seconds to save performance
        setTimeout(() => clearInterval(petalInterval), 6000);
    </script>
</body>
</html>
