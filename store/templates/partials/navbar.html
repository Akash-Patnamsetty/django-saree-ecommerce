<header id="header">
  <div class="header-inner">
    <div class="nav-left">
      <a href="/" class="logo1">Gnapika</a>

    </div>

    <div class="drawer-search">
      <input id="search-input" type="text" placeholder="Search styles, fabrics..." autocomplete="off">
      <svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
    </div>

    <div class="nav-right">
      {% if request.session.user_id %}
      <a href="{% url 'like_view' %}" class="icon-btn" id="headerWishBtn" style="position:relative">
        <svg viewBox="0 0 24 24">
          <path
            d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" />
        </svg>
        <span class="hdr-badge" id="wishBadge" style="display:none">0</span>
      </a>
      {% else %}
      <a href="{% url 'login' %}" class="icon-btn" id="headerWishBtn" style="position:relative">
        <svg viewBox="0 0 24 24">
          <path
            d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" />
        </svg>
        <span class="hdr-badge" id="wishBadge" style="display:none">0</span>
      </a>
      {% endif %}



      {% if request.session.user_id %}
      <a href="{% url 'cart' %}" class="icon-btn" id="headerCartBtn" style="position:relative">
        <svg viewBox="0 0 24 24">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 01-8 0" />
        </svg>
        <span class="hdr-badge" id="cartBadge" style="display:none">0</span>
      </a>
      {% else %}
      <a href="{% url 'login' %}" class="icon-btn" id="headerCartBtn" style="position:relative">
        <svg viewBox="0 0 24 24">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 01-8 0" />
        </svg>
        <span class="hdr-badge" id="cartBadge" style="display:none">0</span>
      </a>
      {% endif %}



      {% if request.session.user_id %}
      <a href="{% url 'profile' %}" class="icon-btn"><svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg></a>
      {% else %}
      <a href="{% url 'login' %}" class="icon-btn"><svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg></a>
      {% endif %}

    </div>
  </div>
</header>
