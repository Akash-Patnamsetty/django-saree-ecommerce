<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saree Heaven | My Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            color: white;
        }

        /* Smooth Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .glass-card:active {
            transform: scale(0.97);
        }

        /* Golden Accent Button */
        .gold-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #f1d592 100%);
            color: #1a1a1a;
        }

        /* Modal Backdrop */
        #fitModal {
            display: none;
        }

        #fitModal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body class="min-h-screen pb-20">

    <header class="relative overflow-hidden bg-gradient-to-b from-[#2d1b1b] to-[#0f0f0f] pt-12 pb-8 px-6 text-center">
        <div class="absolute top-6 left-6 cursor-pointer opacity-70 hover:opacity-100 transition">
            <a href="javascript:history.back()" class="text-zinc-500 hover:text-white mr-6 transition"><i
                    class="fas fa-chevron-left text-xl"></i></a>

        </div>

        <div class="relative inline-block group mb-4">
            <div
                class="w-24 h-24 bg-zinc-800 rounded-full mx-auto flex items-center justify-center border-2 border-[#d4af37] shadow-[0_0_20px_rgba(212,175,55,0.2)]">
                <i class="fas fa-user-alt text-4xl text-zinc-500"></i>
            </div>
            <!-- <div class="absolute bottom-1 right-1 gold-gradient p-1.5 rounded-full text-[10px] shadow-lg">
                <!-- <i class="fas fa-pen"></i> --
            </div> -->
        </div>

        <h1 class="text-2xl font-bold tracking-tight">{{user.full_name}}</h1>
        <p class="text-zinc-500 text-sm mt-1">+91 {{user.phone_number}}</p>
    </header>

    <main class="max-w-md mx-auto px-5 space-y-6">

        <section class="grid grid-cols-3 gap-3 animate-up" style="animation-delay: 0.1s;">

            <div class="glass-card p-4 rounded-2xl text-center group cursor-pointer">
                <div
                    class="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center mx-auto mb-2 transition group-hover:bg-[#d4af37]/20">
                    <a href="/like_view/"><i class="far fa-heart text-[#D4AF37]"></i></a>
                </div>
                <span class="text-[11px] font-semibold uppercase tracking-wider text-zinc-400">wishlist</span>
            </div>


            <div class="glass-card p-4 rounded-2xl text-center group cursor-pointer">
                <div
                    class="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center mx-auto mb-2 transition group-hover:bg-[#d4af37]/20">
                    <a href="/cart/"> <i class="fas fa-cart-shopping text-[#D4AF37]"></i></a>
                </div>
                <a href="/cart/"><span
                        class="text-[11px] font-semibold uppercase tracking-wider text-zinc-400">cart</span></a>
            </div>

            <div class="glass-card p-4 rounded-2xl text-center group cursor-pointer">
                <div
                    class="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center mx-auto mb-2 transition group-hover:bg-[#d4af37]/20">
                    <a href="/order_history/"><i class="fas fa-receipt text-[#D4AF37]"></i></a>
                </div>
                <a href="/order_history/">
                    <span class="text-[11px] font-semibold uppercase tracking-wider text-zinc-400">Orders</span>
                </a>
            </div>
        </section>

        <section class="animate-up" style="animation-delay: 0.2s;" onclick="toggleModal(true)">
            <div
                class="bg-zinc-900 border border-[#d4af37]/30 p-5 rounded-2xl flex items-center justify-between cursor-pointer active:scale-95 transition">
                <div class="flex items-center gap-4">
                    <div class="gold-gradient w-12 h-12 rounded-xl flex items-center justify-center shadow-lg">
                        <!-- <i class="fas fa-ruler-horizontal text-lg"></i> -->
                        <i class="fas fa-pen text-lg"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-bold text-white">Edit Profile</h3>
                        <p class="text-xs text-zinc-500">update the details</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-zinc-600"></i>
            </div>
        </section>

        <section class="space-y-2 animate-up" style="animation-delay: 0.3s;">
            <h2 class="text-[10px] font-black text-zinc-600 uppercase tracking-[0.2em] ml-2 mb-3">Essentials</h2>

            <!-- <div class="glass-card flex items-center justify-between p-4 rounded-2xl cursor-pointer hover:bg-white/5">
                <div class="flex items-center gap-4">
                    <i class="fas fa-heart text-rose-500 w-5 text-center"></i>
                    <span class="text-sm font-medium">Saved Sarees (Wishlist)</span>
                </div>
                <span class="bg-zinc-800 text-[10px] px-2 py-1 rounded-full text-zinc-400">12</span>
            </div> -->

            <!-- <div class="glass-card flex items-center justify-between p-4 rounded-2xl cursor-pointer hover:bg-white/5">
                <div class="flex items-center gap-4">
                    <i class="fab fa-whatsapp text-emerald-500 w-5 text-center text-lg"></i>
                    <div>
                        <p class="text-sm font-medium">WhatsApp Updates</p>
                        <p class="text-[10px] text-zinc-500">Order tracking & offers</p>
                    </div>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" checked class="sr-only peer">
                    <div class="w-10 h-5 bg-zinc-700 rounded-full peer peer-checked:bg-emerald-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5"></div>
                </label>
            </div> -->


            <div x-data="{ open: false }" class="w-full max-w-md">
                <div @click="open = !open"
                    class="glass-card flex items-center justify-between p-4 rounded-2xl cursor-pointer hover:bg-white/5 transition-all">
                    <div class="flex items-center gap-4">
                        <i class="fas fa-map-marker-alt text-zinc-500 w-5 text-center"></i>
                        <span class="text-sm font-medium">Address Book</span>
                    </div>
                    <i class="fas fa-chevron-right text-[10px] text-zinc-700 transition-transform"
                        :class="open ? 'rotate-90' : ''"></i>
                </div>

                <div x-show="open" x-transition:enter="transition ease-out duration-200"
                    x-transition:enter-start="opacity-0 transform -translate-y-2"
                    x-transition:enter-end="opacity-100 transform translate-y-0"
                    class="mt-2 p-4 bg-black border border-yellow-600/30 rounded-2xl shadow-xl">

                    <ul class="space-y-3">
                        {%for ads in addresses%}
                        <li class="flex flex-col border-b border-yellow-900/50 pb-2">
                            <span
                                class="text-[10px] uppercase tracking-widest text-yellow-600 font-bold">{{ads.title}}</span>
                            <span class="text-sm text-yellow-500">{{ads.address}}</span>
                        </li>
                        {%endfor%}
                    </ul>
                </div>
            </div>

            <!-- Lorem ipsum dolor sit amet consectetur adipisicing elit. Doloremque dolore porro vel. Necessitatibus saepe laboriosam quibusdam, eveniet illo aut expedita iusto vel sint neque alias laudantium omnis aliquam recusandae commodi! -->
        </section>

        <button
            class="w-full py-4 text-sm font-bold text-zinc-600 hover:text-red-400 transition tracking-widest uppercase">
            <a href="{% url 'logout' %}">Sign Out</a>
        </button>
    </main>

    <div id="fitModal" class="fixed inset-0 z-50 flex items-center justify-center px-6">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="toggleModal(false)"></div>
        <div class="relative bg-zinc-900 w-full max-w-sm rounded-3xl p-6 border border-zinc-800 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Measurement Detail</h3>
                <i class="fas fa-times cursor-pointer" onclick="toggleModal(false)"></i>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-zinc-500 uppercase font-bold">Blouse Chest Size (Inches)</label>
                    <input type="number" placeholder="e.g. 36"
                        class="w-full bg-zinc-800 border-none rounded-xl p-3 mt-1 text-sm focus:ring-2 ring-[#d4af37]">
                </div>
                <div>
                    <label class="text-[10px] text-zinc-500 uppercase font-bold">Total Height (for Fall/Pico)</label>
                    <input type="text" placeholder="e.g. 5' 4\"
                        class="w-full bg-zinc-800 border-none rounded-xl p-3 mt-1 text-sm focus:ring-2 ring-[#d4af37]">
                </div>
                <button class="w-full gold-gradient py-3 rounded-xl font-bold text-sm shadow-lg shadow-yellow-900/20"
                    onclick="toggleModal(false)">
                    Save My Fit
                </button>
            </div>
        </div>
    </div>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        function toggleModal(show) {
            const modal = document.getElementById('fitModal');
            if (show) {
                modal.classList.add('active');
            } else {
                modal.classList.remove('active');
            }
        }

    </script>
</body>

</html>
